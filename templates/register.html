<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Smart Habit Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#000080;" class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark" style="background:#2563EB;">
<div class="container-fluid">
<a class="navbar-brand fs-1" href="/">SmartHabit</a>
</div>
</nav>

<div class="container-fluid mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow p-4 fs-1">

<h3 class="text-center mb-4 fs-1">Create Account</h3>

<form action="/register" method="POST">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" name="name" class="form-control fs-1" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control fs-1" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control fs-1" required>
</div>

<button type="submit" class="btn btn-success w-100 fs-1">
Register
</button>

<div class="text-center mt-3">
<p>Already have an account? <a href="/login">Login</a></p>
</div>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
